name: Windows RDP via Tailscale (B)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (e.g. you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key (device admin, no 'Bearer')"
        required: true
      ts_authkey:
        description: "Tailscale auth key (reusable or ephemeral)"
        required: true
      gh_api_token:
        description: "GitHub Personal Access Token (classic; scopes: repo, workflow)"
        required: true
      test_mode:
        description: "Run 5-minute test loop"
        type: boolean
        default: false
      runtime_minutes:
        description: "Runtime in minutes (max 360; capped to 355)"
        required: false
        default: "355"
      loops:
        description: "How many handoffs (0 = infinite)"
        required: false
        default: "0"

  # Backup trigger: starts B when A completes (optional safeguard)
  workflow_run:
    workflows: ["Windows RDP via Tailscale (A)"]
    types: [completed]

concurrency:
  group: tailscale-rdp-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  id-token: write

defaults:
  run:
    shell: pwsh

env:
  RDP_USER: ARAtik169
  RDP_PASS: Khoti@1234
  TS_HOSTNAME: bullet

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 370
    outputs:
      tailnet: ${{ steps.cfg.outputs.tailnet }}
      apikey: ${{ steps.cfg.outputs.apikey }}
      authkey: ${{ steps.cfg.outputs.authkey }}
      pat: ${{ steps.cfg.outputs.pat }}
      runtime: ${{ steps.cfg.outputs.runtime }}
      loops: ${{ steps.cfg.outputs.loops }}

    steps:
      - name: 🔧 Resolve inputs (safe)
        id: cfg
        env:
          RAW_TAILNET:  ${{ inputs.ts_tailnet }}
          RAW_APIKEY:   ${{ inputs.ts_api_key }}
          RAW_AUTHKEY:  ${{ inputs.ts_authkey }}
          RAW_PAT:      ${{ inputs.gh_api_token }}
          RAW_TEST:     ${{ inputs.test_mode == true && 'true' || 'false' }}
          RAW_RUNTIME:  ${{ inputs.runtime_minutes || '355' }}
          RAW_LOOPS:    ${{ inputs.loops || '0' }}
        run: |
          function ToIntOr($v, $def){ if("$v" -match '^\d+$'){[int]$v}else{[int]$def} }

          $tailnet = $env:RAW_TAILNET
          $apiKey  = $env:RAW_APIKEY
          $authKey = $env:RAW_AUTHKEY
          $pat     = $env:RAW_PAT

          if (-not $tailnet -or -not $apiKey -or -not $authKey -or -not $pat) {
            Write-Error "❌ Missing required inputs"
            exit 1
          }

          $isTest = ($env:RAW_TEST -match '^(?i:true|1|yes|on)$')
          $runtime = ToIntOr $env:RAW_RUNTIME 355
          if ($isTest) { $runtime = 5 }

          if (-not $isTest -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }

          $loops = ToIntOr $env:RAW_LOOPS 0
          if ($loops -lt 0) { $loops = 0 }

          echo "tailnet=$tailnet"  >> $env:GITHUB_OUTPUT
          echo "apikey=$apiKey"    >> $env:GITHUB_OUTPUT
          echo "authkey=$authKey"  >> $env:GITHUB_OUTPUT
          echo "pat=$pat"          >> $env:GITHUB_OUTPUT
          echo "runtime=$runtime"  >> $env:GITHUB_OUTPUT
          echo "loops=$loops"      >> $env:GITHUB_OUTPUT

          Write-Host "✅ Resolved: test=$isTest, runtime=$runtime, loops=$loops"

      - name: ⚙️ Install Tailscale (if missing) & show version
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $exe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $exe)) {
            $url = 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe'
            $dst = "$env:TEMP\tailscale-setup.exe"
            Invoke-WebRequest -Uri $url -OutFile $dst -UseBasicParsing
            Start-Process -FilePath $dst -ArgumentList "/quiet" -Wait
          }
          if (Get-Service Tailscale -ErrorAction SilentlyContinue) {
            Start-Service Tailscale -ErrorAction SilentlyContinue
          }
          & "C:\Program Files\Tailscale\tailscale.exe" version

      - name: 🔐 Enable RDP user + firewall
        run: |
          $u="${{ env.RDP_USER }}"; $p="${{ env.RDP_PASS }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group Administrators -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null

      - name: 🧹 Purge existing devices named 'bullet'
        run: |
          try {
            $hdr = @{ Authorization = "Bearer ${{ steps.cfg.outputs.apikey }}"; Accept = "application/json" }
            $tn  = [uri]::EscapeDataString("${{ steps.cfg.outputs.tailnet }}")
            
            $getUri = "https://api.tailscale.com/api/v2/tailnet/$tn/devices"
            $resp = Invoke-RestMethod -Method GET -Headers $hdr -Uri $getUri
            
            $deleted = $false
            foreach ($d in $resp.devices) {
              if ($d.hostname -match '(?i)^bullet(-\d+)?$' -or $d.name -match '(?i)^bullet(-\d+)?\.') {
                $delUri = "https://api.tailscale.com/api/v2/device/$($d.id)"
                Invoke-RestMethod -Method DELETE -Headers $hdr -Uri $delUri
                Write-Host "🧹 Deleted old device: $($d.hostname) ($($d.name)) with ID: $($d.id)"
                $deleted = $true
              }
            }
            
            if ($deleted) {
              Write-Host "⏳ Waiting 10 seconds for Tailscale servers to completely flush the name..."
              Start-Sleep -Seconds 10
            } else {
              Write-Host "✨ No existing 'bullet' devices found."
            }
          } catch { 
            Write-Warning "Purge failed. Check your API Key. Error: $($_.Exception.Message)" 
          }

      - name: 🔗 Tailscale up (hostname=bullet)
        id: up
        run: |
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          & $ts logout | Out-Null
          & $ts up --authkey "${{ steps.cfg.outputs.authkey }}" --hostname "${{ env.TS_HOSTNAME }}" --accept-routes --accept-dns=false
          Start-Sleep -Seconds 2
          $ip4 = (& $ts ip -4 | Select-Object -First 1)
          $status = & $ts status --json | ConvertFrom-Json
          $fqdn = $status.Self.DNSName
          $derp = $status.Self.DERP
          echo "ip4=$ip4"   >> $env:GITHUB_OUTPUT
          echo "fqdn=$fqdn" >> $env:GITHUB_OUTPUT
          echo "derp=$derp" >> $env:GITHUB_OUTPUT
          "### RDP (B)`nHost: $env:TS_HOSTNAME`nIPv4: $ip4`nMagicDNS: $fqdn`nDERP: $derp`nUser: $env:RDP_USER`nPass: $env:RDP_PASS" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: 📦 Cache Pentest Installers
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: C:\Users\Public\Desktop\Android_Pentest_Kit
          key: pentest-tools-v1

      - name: 🧰 Pre-load Android Pentest Environment
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $ErrorActionPreference = 'Stop'
          
          Write-Host "Installing 7-Zip..."
          choco install 7zip -y | Out-Null

          $toolkit = "C:\Users\Public\Desktop\Android_Pentest_Kit"
          if (-not (Test-Path $toolkit)) { New-Item -ItemType Directory -Force -Path $toolkit | Out-Null }
          Set-Location $toolkit
          
          function Get-Tool($fileName, $url) {
            if (-not (Test-Path $fileName)) {
              Write-Host "Downloading $fileName..."
              curl.exe --fail --retry 3 -L -o $fileName $url
            } else {
              Write-Host "✅ $fileName already cached! Skipping download."
            }
          }
          
          Write-Host "1. Getting Python 3.14.5..."
          Get-Tool "python-3.14.5-amd64.exe" "https://www.python.org/ftp/python/3.14.5/python-3.14.5-amd64.exe"
          Write-Host "Installing Python..."
          Start-Process -FilePath "python-3.14.5-amd64.exe" -ArgumentList "/quiet InstallAllUsers=1 PrependPath=1 Include_test=0" -Wait
          
          Write-Host "2. Getting MuMu Player 5.0.11 Installer..."
          Get-Tool "MuMu-Setup.exe" "https://a11.gdl.netease.com/MuMu_5.0.11_gw-win-download_all_1770087078.exe?n=MuMu_5.0.11_KPD5eHC.exe"
          
          Write-Host "3. Getting and Installing Java JDK-21 (Silent)..."
          Get-Tool "jdk-21.exe" "https://download.oracle.com/java/21/archive/jdk-21_windows-x64_bin.exe"
          Write-Host "Installing JDK..."
          Start-Process -FilePath "jdk-21.exe" -ArgumentList "/s" -Wait
          
          Write-Host "4. Getting and Installing Java JRE-8 (Silent)..."
          Get-Tool "jre-8.exe" "https://javadl.oracle.com/webapps/download/AutoDL?BundleId=247947_0ae14417abb444ebb02b9815e2103550"
          Write-Host "Installing JRE..."
          Start-Process -FilePath "jre-8.exe" -ArgumentList "/s" -Wait
          
          Write-Host "5. Getting Burp Suite Professional & Loader..."
          $version = "2025"
          Get-Tool "burpsuite_pro_v$version.jar" "https://portswigger.net/burp/releases/download?product=pro&type=Jar"
          Get-Tool "loader.jar" "https://github.com/xiv3r/Burpsuite-Professional/raw/refs/heads/main/loader.jar"

          if (-not (Test-Path "Burp.bat")) {
            Write-Host "Creating Burp execution files..."
            $batCmd = "java --add-opens=java.desktop/javax.swing=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/jdk.internal.org.objectweb.asm=ALL-UNNAMED --add-opens=java.base/jdk.internal.org.objectweb.asm.tree=ALL-UNNAMED --add-opens=java.base/jdk.internal.org.objectweb.asm.Opcodes=ALL-UNNAMED -javaagent:`"$toolkit\loader.jar`" -noverify -jar `"$toolkit\burpsuite_pro_v$version.jar`""
            $batCmd | Set-Content -Path "Burp.bat"

            $vbsContent = "Set WshShell = CreateObject(`"WScript.Shell`")`r`nWshShell.Run chr(34) & `"$toolkit\Burp.bat`" & Chr(34), 0`r`nSet WshShell = Nothing"
            $vbsContent | Set-Content -Path "Burp-Suite-Pro.vbs"
          }
          
          Write-Host "6. Getting and Extracting Frida Server 17.9.8..."
          Get-Tool "frida-server-17.9.8-android-x86_64.xz" "https://github.com/frida/frida/releases/download/17.9.8/frida-server-17.9.8-android-x86_64.xz"
          if (-not (Test-Path "frida-server")) {
            & "C:\Program Files\7-Zip\7z.exe" e "frida-server-17.9.8-android-x86_64.xz" -o"$toolkit" -y | Out-Null
            Rename-Item "frida-server-17.9.8-android-x86_64" "frida-server"
          }
          
          Write-Host "7. Getting Kitsune Magisk..."
          Get-Tool "Kitsune-Magisk-26.4.apk" "https://github.com/Scratch2033Alt/KitsuneMagisk/raw/refs/heads/main/26.4-kitsune.apk"
          
          Write-Host "8. Getting ADB (Platform Tools)..."
          Get-Tool "platform-tools.zip" "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          if (-not (Test-Path "platform-tools")) {
            & "C:\Program Files\7-Zip\7z.exe" x "platform-tools.zip" -o"$toolkit" -y | Out-Null
          }
          
          Write-Host "Adding ADB to System PATH..."
          & setx /M PATH "$([Environment]::GetEnvironmentVariable('PATH', 'Machine'));$toolkit\platform-tools"
          
          Write-Host "✅ Environment setup complete! Check the Android_Pentest_Kit folder on your Desktop."

      - name: ⏳ Keep alive
        run: |
          $mins=[int]"${{ steps.cfg.outputs.runtime }}"
          $end=(Get-Date).AddMinutes($mins)
          while((Get-Date) -lt $end){
            $left=[int]([math]::Ceiling(($end-(Get-Date)).TotalMinutes))
            Write-Host "🕒 RDP alive... ($left min left)"
            Start-Sleep -Seconds 60
          }

      - name: 🔁 Dispatch workflow A
        if: always()
        run: |
          $loops=[int]"${{ steps.cfg.outputs.loops }}"
          if ($loops -eq 1) { Write-Host "✅ Loops finished; stopping."; exit 0 }
          if ($loops -gt 1) { $next=$loops-1 } else { $next=0 }

          $token="${{ steps.cfg.outputs.pat }}"
          $body=@{
            ref    = "${{ github.ref_name }}"
            inputs = @{
              ts_tailnet      = "${{ steps.cfg.outputs.tailnet }}"
              ts_api_key      = "${{ steps.cfg.outputs.apikey }}"
              ts_authkey      = "${{ steps.cfg.outputs.authkey }}"
              gh_api_token    = "$token"
              test_mode       = "false"
              runtime_minutes = "${{ steps.cfg.outputs.runtime }}"
              loops           = "$next"
            }
          } | ConvertTo-Json -Depth 5

          Invoke-RestMethod -Method POST `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/windows-rdp-tailscale-A.yml/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; "Accept"="application/vnd.github+json" } `
            -Body $body
